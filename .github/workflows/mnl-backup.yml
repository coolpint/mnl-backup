name: mnl-backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 21 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run full backup
        run: python -m mnl_backup --data-dir data sync --full --delay 0.5

      - name: Create compressed snapshot
        id: snapshot
        run: |
          SNAPSHOT_PATH="$(python -m mnl_backup --data-dir data snapshot --output-dir exports)"
          echo "path=${SNAPSHOT_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload snapshot as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnl-backup-${{ github.run_id }}
          path: ${{ steps.snapshot.outputs.path }}
          retention-days: 30

      - name: Upload snapshot to OneDrive
        if: ${{ secrets.MNL_ONEDRIVE_TENANT_ID != '' && secrets.MNL_ONEDRIVE_CLIENT_ID != '' && secrets.MNL_ONEDRIVE_CLIENT_SECRET != '' && secrets.MNL_ONEDRIVE_DRIVE_ID != '' }}
        env:
          MNL_ONEDRIVE_TENANT_ID: ${{ secrets.MNL_ONEDRIVE_TENANT_ID }}
          MNL_ONEDRIVE_CLIENT_ID: ${{ secrets.MNL_ONEDRIVE_CLIENT_ID }}
          MNL_ONEDRIVE_CLIENT_SECRET: ${{ secrets.MNL_ONEDRIVE_CLIENT_SECRET }}
          MNL_ONEDRIVE_DRIVE_ID: ${{ secrets.MNL_ONEDRIVE_DRIVE_ID }}
        run: python -m mnl_backup onedrive-upload --snapshot-path "${{ steps.snapshot.outputs.path }}" --remote-dir snapshots
